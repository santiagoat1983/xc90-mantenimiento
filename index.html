<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0a1a2a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="description" content="Mantenimiento Volvo XC90 D5 2019"/>
<link rel="manifest" href="manifest.json"/>
<title>XC90 · Mantenimiento</title>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#0a1a2a;color:#e8f4f8;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px;line-height:1.5;}
#app{max-width:720px;margin:0 auto;padding:12px 14px 80px;}
button{font-family:inherit;cursor:pointer;}
input,textarea,select{font-family:inherit;}
textarea{resize:vertical;}
select option{background:#1a2e40;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#006fa6;border-radius:2px;}

/* ── Layout ── */
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px 16px;margin-bottom:12px;}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.col{display:flex;flex-direction:column;}

/* ── Header ── */
#header{padding:18px 0 14px;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:14px;}
#header h1{font-size:19px;font-weight:700;letter-spacing:-.5px;color:#fff;}
#header p{font-size:11px;color:#7fb3c8;margin-top:2px;}
#mat-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 12px;color:#fff;font-size:12px;letter-spacing:1.5px;}
#mat-input{background:rgba(255,255,255,.08);border:1px solid #006fa6;border-radius:7px;padding:6px 10px;color:#fff;width:120px;font-size:13px;outline:none;text-transform:uppercase;}

/* ── Auth bar ── */
#auth-bar{border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
#auth-bar.out{background:rgba(0,111,166,.09);border:1px solid rgba(0,111,166,.28);}
#auth-bar.in{background:rgba(46,125,50,.09);border:1px solid rgba(46,125,50,.28);}
#auth-bar.warn{background:rgba(184,134,11,.12);border:1px solid rgba(184,134,11,.4);}
.auth-label{font-size:13px;font-weight:600;}
.auth-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px;}
#btn-login{background:#fff;border:none;border-radius:8px;padding:8px 14px;display:flex;align-items:center;gap:7px;font-weight:600;font-size:13px;color:#1a2e40;box-shadow:0 2px 8px rgba(0,0,0,.35);}
#btn-logout{background:transparent;border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:5px 11px;color:rgba(255,255,255,.45);font-size:12px;}
#sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;}

/* ── KM selector ── */
#km-wrap{background:linear-gradient(135deg,#1a3a4a,#0d2030);border-radius:14px;padding:14px 18px;margin-bottom:12px;display:flex;align-items:center;gap:12px;box-shadow:0 6px 24px rgba(0,0,0,.3);}
#km-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#7fb3c8;white-space:nowrap;}
#km-select{background:transparent;border:none;border-bottom:2px solid #006fa6;color:#fff;font-size:20px;font-weight:700;padding:2px 6px;outline:none;appearance:none;flex:1;}

/* ── Progress ── */
#progress-bar-wrap{height:5px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:8px;}
#progress-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,#006fa6,#00b4d8);transition:width .5s ease;}
#progress-bar.done{background:linear-gradient(90deg,#2e7d32,#4caf50);}
.stat-pill{font-size:11px;}

/* ── Filter bar ── */
#filter-bar{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.filter-btn{border-radius:20px;padding:5px 13px;font-size:12px;font-weight:500;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:rgba(255,255,255,.55);transition:all .2s;}
.filter-btn.active{background:#006fa6;border-color:#006fa6;color:#fff;}
#btn-history{border-radius:20px;padding:5px 13px;font-size:12px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);}
#btn-print{margin-left:auto;background:linear-gradient(135deg,#1a3a4a,#006fa6);border:1px solid rgba(0,180,216,.4);border-radius:9px;padding:8px 16px;color:#fff;font-size:12px;font-weight:600;box-shadow:0 3px 14px rgba(0,111,166,.25);}

/* ── Sistema section ── */
.sis-wrap{border-radius:13px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.02);margin-bottom:10px;overflow:hidden;transition:border-color .3s;}
.sis-wrap.done{background:rgba(46,125,50,.06);}
.sis-header{display:flex;align-items:center;gap:12px;padding:11px 15px;cursor:pointer;border:none;background:none;width:100%;text-align:left;}
.sis-name{font-weight:700;font-size:14px;color:#e8f4f8;flex:1;}
.sis-pct{font-size:11px;color:rgba(255,255,255,.35);}
.sis-done-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;color:#fff;}
.sis-chevron{font-size:14px;color:rgba(255,255,255,.25);transition:transform .25s;display:inline-block;}
.sis-chevron.open{transform:rotate(180deg);}
.sis-body{padding:0 12px 12px;}
.sis-prog{height:3px;border-radius:2px;background:rgba(255,255,255,.08);margin-bottom:11px;overflow:hidden;}
.sis-prog-fill{height:100%;border-radius:2px;transition:width .5s;}

/* ── Task item ── */
.task{border-radius:9px;margin-bottom:5px;overflow:hidden;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);transition:all .2s;}
.task.checked{background:rgba(46,125,50,.1);border-color:rgba(46,125,50,.3);}
.task-header{display:flex;align-items:center;gap:9px;padding:8px 11px;cursor:pointer;}
.chk{width:23px;height:23px;border-radius:7px;border:2px solid rgba(255,255,255,.2);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;cursor:pointer;}
.chk.on{border-color:#2e7d32;background:#2e7d32;box-shadow:0 0 8px rgba(46,125,50,.45);}
.chk.on::after{content:"✓";color:#fff;font-size:13px;}
.task-name{flex:1;font-size:13px;font-weight:500;color:#e8f4f8;transition:all .2s;}
.task.checked .task-name{color:rgba(255,255,255,.4);text-decoration:line-through;}
.prio-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;}
.note-icon{font-size:12px;opacity:.6;}
.task-chevron{font-size:11px;color:rgba(255,255,255,.25);transition:transform .2s;display:inline-block;}
.task-chevron.open{transform:rotate(180deg);}
.task-detail{padding:0 11px 10px 43px;border-top:1px solid rgba(255,255,255,.05);}
.task-hint{color:#7fb3c8;font-size:12px;margin:8px 0 6px;line-height:1.6;}
.detail-meta{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-top:4px;}
.sis-chip{font-size:11px;padding:2px 8px;border-radius:20px;}
.interval-chip{font-size:11px;color:rgba(255,255,255,.35);}
.btn-nota{background:transparent;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.45);border-radius:6px;padding:2px 9px;font-size:11px;}
.nota-edit{display:flex;gap:5px;width:100%;margin-top:6px;}
.nota-edit input{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(0,111,166,.5);border-radius:7px;padding:5px 9px;color:#fff;font-size:12px;outline:none;}
.nota-save{background:#006fa6;border:none;border-radius:7px;padding:5px 11px;color:#fff;font-size:12px;}
.nota-cancel{background:transparent;border:1px solid rgba(255,255,255,.15);border-radius:7px;padding:5px 11px;color:rgba(255,255,255,.4);font-size:12px;}
.nota-display{margin-top:7px;padding:7px 9px;border-radius:7px;background:rgba(0,111,166,.12);border:1px solid rgba(0,111,166,.28);color:#a8d4e8;font-size:12px;}

/* ── Comentarios ── */
#comentarios-wrap{border-radius:13px;border:1px solid rgba(0,111,166,.3);background:rgba(0,111,166,.05);margin-bottom:14px;overflow:hidden;}
#comentarios-header{padding:11px 15px 7px;border-bottom:1px solid rgba(0,111,166,.15);}
#comentarios-header p{font-size:13px;font-weight:600;color:#7fb3c8;}
#comentarios-header small{font-size:11px;color:rgba(255,255,255,.3);}
#comentarios-ta{width:100%;min-height:110px;background:transparent;border:none;outline:none;color:#e8f4f8;font-size:13px;line-height:1.7;padding:11px 15px;}

/* ── Completed banner ── */
#done-banner{border-radius:13px;padding:18px;text-align:center;background:linear-gradient(135deg,rgba(46,125,50,.18),rgba(46,125,50,.04));border:1px solid rgba(46,125,50,.35);margin-bottom:14px;}
#done-banner p{font-size:14px;font-weight:700;color:#4caf50;}
#done-banner small{font-size:12px;color:rgba(255,255,255,.4);}

/* ── History ── */
#history-wrap{border-radius:13px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.02);padding:15px;margin-bottom:14px;}
.hist-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.hist-km{background:rgba(0,111,166,.15);border:1px solid rgba(0,111,166,.35);border-radius:7px;padding:3px 10px;color:#00b4d8;font-size:12px;font-weight:700;cursor:pointer;}
.hist-bar{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.07);overflow:hidden;}
.hist-fill{height:100%;border-radius:2px;}
.hist-count{font-size:11px;color:rgba(255,255,255,.4);}

/* ── Ring SVG ── */
.ring{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:rgba(255,255,255,.1);}
.ring-fill{fill:none;stroke-linecap:round;transition:stroke-dashoffset .5s ease;}
.ring-text{font-size:10px;fill:#fff;transform-origin:center;transform:rotate(90deg);}

/* ── Empty state ── */
#empty{text-align:center;padding:60px 20px;color:rgba(255,255,255,.25);}
#empty .ico{font-size:46px;margin-bottom:14px;}
#empty p{font-size:13px;letter-spacing:.5px;}

/* ── Footer ── */
#footer{margin-top:28px;padding-top:14px;border-top:1px solid rgba(255,255,255,.05);display:flex;justify-content:space-between;}
#footer span{font-size:10px;color:rgba(255,255,255,.18);}

/* ── Drive folder info banner ── */
#folder-info{background:rgba(46,125,50,.08);border:1px solid rgba(46,125,50,.25);border-radius:9px;padding:8px 13px;margin-top:8px;display:flex;align-items:center;gap:8px;}
#folder-info p{font-size:12px;color:#81c784;}
#folder-info small{font-size:11px;color:rgba(255,255,255,.35);}

@media print {
  body{background:#fff !important;color:#000 !important;}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .no-print{display:none !important;}
  #app{padding:0;}
  .sis-body{display:block !important;}
  .task-detail{display:block !important;}
}
</style>
</head>

<div id="app">

  <!-- HEADER -->
  <div id="header" class="no-print">

      <div>
        <div class="row" style="gap:8px;">
          <div style="width:5px;height:26px;border-radius:3px;background:linear-gradient(180deg,#006fa6,#1a3a4a);flex-shrink:0;"></div>
          <h1>VOLVO XC90 D5</h1>
        </div>
        <p style="padding-left:13px;">Plan de mantenimiento · 2019 · AWD · 235 CV Diesel</p>

  <!-- AUTH BAR -->
  <div id="auth-bar" class="out no-print">
    <div class="col">
      <span class="auth-label" style="color:#7fb3c8;">☁️ Sincronización Google Drive</span>
      <span class="auth-sub" id="auth-sub">Datos guardados localmente · Inicia sesión para sincronizar</span>

    <div id="auth-actions"></div>
  </div>

  <!-- DRIVE FOLDER INFO (hidden until logged in) -->
  <div id="folder-info" style="display:none;" class="no-print">
    <span style="font-size:16px;">📁</span>
    <div>
      <p>Datos guardados en <strong>Mi unidad / XC90 Mantenimiento /</strong></p>
      <small>Archivo: xc90_data.json · Puedes hacer backup desde Google Drive</small>

  </div>

  <!-- KM SELECTOR -->
  <div id="km-wrap" class="no-print">
    <span id="km-label">KM actuales</span>
    <select id="km-select">
      <option value="0">— seleccionar —</option>
    </select>
  </div>

  <!-- MAIN CONTENT -->
  <div id="main"></div>

</div>

const CLIENT_ID   = '270446134512-88stntlo997hs1h64uos32rof3bd8lvo.apps.googleusercontent.com';
const FOLDER_NAME = 'XC90 Mantenimiento';
const FILE_NAME   = 'xc90_data.json';
const SCOPES      = 'https://www.googleapis.com/auth/drive.file';

let _token    = null;
let _fileId   = null;
let _folderId = null;
let _tokenClient = null;
let _saveTimer   = null;

function initGSI(){
  if(!window.google?.accounts?.oauth2){ setTimeout(initGSI,300); return; }
  _tokenClient = window.google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async(resp)=>{
      if(resp.error){ setState({authState:'out'}); return; }
      _token = resp.access_token;
      setState({authState:'loading', syncState:null});
      try{
        await loadFromDrive();
        setState({authState:'in'});
        document.getElementById('folder-info').style.display='flex';
      } catch(e){ console.error(e); setState({authState:'out'}); }
    }
  });
  setState({gsiReady:true});
}
window.addEventListener('load',()=>setTimeout(initGSI,500));

function doLogin(){
  if(!_tokenClient) return;
  setState({authState:'loading'});
  _tokenClient.requestAccessToken({prompt:'consent'});
}
function doLogout(){
  if(_token) window.google.accounts.oauth2.revoke(_token,()=>{});
  _token=null; _fileId=null; _folderId=null;
  document.getElementById('folder-info').style.display='none';
  setState({authState:'out', syncState:null});
}

async function driveReq(url,opts={}){
  const r=await fetch(url,{...opts,headers:{
    'Authorization':'Bearer '+_token,
    ...(opts.headers||{})
  }});
  if(r.status===401){_token=null; throw new Error('TOKEN_EXPIRED');}
  return r;
}

async function getOrCreateFolder(){
  if(_folderId) return _folderId;
  // Search
  const q=encodeURIComponent(`mimeType='application/vnd.google-apps.folder' and name='${FOLDER_NAME}' and trashed=false`);
  const r=await driveReq(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`);
  const d=await r.json();
  if(d.files&&d.files.length){_folderId=d.files[0].id; return _folderId;}
  // Create
  const cr=await driveReq('https://www.googleapis.com/drive/v3/files',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name:FOLDER_NAME,mimeType:'application/vnd.google-apps.folder'})
  });
  const cd=await cr.json();
  _folderId=cd.id; return _folderId;
}

async function findFile(folderId){
  if(_fileId) return _fileId;
  const q=encodeURIComponent(`name='${FILE_NAME}' and '${folderId}' in parents and trashed=false`);
  const r=await driveReq(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`);
  const d=await r.json();
  if(d.files&&d.files.length){_fileId=d.files[0].id; return _fileId;}
  return null;
}

async function loadFromDrive(){
  const fid=await getOrCreateFolder();
  const fileId=await findFile(fid);
  if(!fileId) return; // first time, nothing to load
  const r=await driveReq(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
  if(!r.ok) return;
  const data=await r.json();
  // Merge into state
  STATE.checks = data.checks||{};
  STATE.notas  = data.notas||{};
  STATE.comentarios = data.comentarios||{};
  STATE.matricula = data.matricula||'';
  STATE.km = data.km||0;
  // sync to localStorage
  lsSave();
}

async function saveToDrive(){
  if(!_token) return;
  const payload={
    checks: STATE.checks,
    notas: STATE.notas,
    comentarios: STATE.comentarios,
    matricula: STATE.matricula,
    km: STATE.km,
    updatedAt: new Date().toISOString()
  };
  const body=JSON.stringify(payload);
  try{
    const fid=await getOrCreateFolder();
    const fileId=await findFile(fid);
    if(fileId){
      await driveReq(
        `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,
        {method:'PATCH',headers:{'Content-Type':'application/json'},body}
      );
    } else {
      const form=new FormData();
      form.append('metadata',new Blob([JSON.stringify({name:FILE_NAME,parents:[fid]})],{type:'application/json'}));
      form.append('file',new Blob([body],{type:'application/json'}));
      const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
        {method:'POST',headers:{Authorization:'Bearer '+_token},body:form});
      const d=await r.json();
      _fileId=d.id;
    }
    setState({syncState:'saved'});
    setTimeout(()=>setState({syncState:null}),3000);
  } catch(e){
    setState({syncState:'error'});
    console.error('Drive save error:',e);
  }
}

function scheduleSave(){
  lsSave();
  if(!_token) return;
  setState({syncState:'saving'});
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(saveToDrive,1500);
}

function lsSave(){
  try{
    localStorage.setItem('xc90_checks',JSON.stringify(STATE.checks));
    localStorage.setItem('xc90_meta',JSON.stringify({
      matricula:STATE.matricula, km:STATE.km,
      notas:STATE.notas, comentarios:STATE.comentarios
    }));
  }catch(e){}
}
function lsLoad(){
  try{
    const c=localStorage.getItem('xc90_checks');
    const m=localStorage.getItem('xc90_meta');
    if(c) STATE.checks=JSON.parse(c);
    if(m){
      const mm=JSON.parse(m);
      STATE.matricula=mm.matricula||'';
      STATE.km=mm.km||0;
      STATE.notas=mm.notas||{};
      STATE.comentarios=mm.comentarios||{};
    }
  }catch(e){}
}

   RENDER ENGINE (Virtual DOM-less, direct DOM)
══════════════════════════════════════════════════════════ */
function setState(patch){
  Object.assign(STATE,patch);
  render();
}

function el(tag,attrs,...children){
  const e=document.createElement(tag);
  for(const [k,v] of Object.entries(attrs||{})){
    if(k==='class') e.className=v;
    else if(k==='style' && typeof v==='object') Object.assign(e.style,v);
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for(const c of children.flat(Infinity)){
    if(c==null||c===false) continue;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  }
  return e;
}

function svgRing(done,total,size,stroke,color){
  const r=(size-stroke*2)/2;
  const circ=2*Math.PI*r;
  const pct=total>0?done/total:0;
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('width',size); svg.setAttribute('height',size);
  svg.setAttribute('class','ring');
  const bg=document.createElementNS(ns,'circle');
  bg.setAttribute('cx',size/2); bg.setAttribute('cy',size/2); bg.setAttribute('r',r);
  bg.setAttribute('stroke-width',stroke); bg.setAttribute('class','ring-bg');
  const fill=document.createElementNS(ns,'circle');
  fill.setAttribute('cx',size/2); fill.setAttribute('cy',size/2); fill.setAttribute('r',r);
  fill.setAttribute('stroke-width',stroke); fill.setAttribute('stroke',color);
  fill.setAttribute('stroke-dasharray',circ);
  fill.setAttribute('stroke-dashoffset',circ*(1-pct));
  fill.setAttribute('class','ring-fill');
  const txt=document.createElementNS(ns,'text');
  txt.setAttribute('x',size/2); txt.setAttribute('y',size/2);
  txt.setAttribute('text-anchor','middle'); txt.setAttribute('dominant-baseline','middle');
  txt.setAttribute('class','ring-text');
  txt.textContent=total>0?Math.round(pct*100)+'%':'—';
  svg.appendChild(bg); svg.appendChild(fill); svg.appendChild(txt);
  return svg;
}

    }

    var td=el('div',{class:'task-detail'});
    detailContent.forEach(function(c){if(c) td.appendChild(typeof c==='string'?document.createTextNode(c):c);});
    wrap.appendChild(td);
  }
  return wrap;
}

function toggleCheck(taskId){
  const kmk=String(STATE.km);
  if(!STATE.checks[kmk]) STATE.checks[kmk]={};
  STATE.checks[kmk][taskId]=!STATE.checks[kmk][taskId];
  scheduleSave();
  renderMain();
}

function saveNota(taskId,texto){
  const kmk=String(STATE.km);
  if(!STATE.notas[kmk]) STATE.notas[kmk]={};
  STATE.notas[kmk][taskId]=texto;
  STATE.editingNota=null;
  scheduleSave();
  renderMain();
}

function renderSistema(sis,tareasApl){
  const kmk=String(STATE.km);
  const checks=STATE.checks[kmk]||{};
  const done=tareasApl.filter(t=>checks[t.id]).length;
  const total=tareasApl.length;
  const allDone=done===total&&total>0;
  const expanded=!!STATE.expandedSis[sis.id];

  const ring=svgRing(done,total,44,4,sis.color);

  const nameRow=el('div',{style:{flex:'1'}},
    el('div',{class:'row',style:{gap:'6px'}},
      el('span',{class:'sis-name',style:{color:allDone?sis.color:'#e8f4f8'}},sis.label),
      allDone?el('span',{class:'sis-done-badge',style:{background:sis.color}},'✓ LISTO'):''
    ),
    el('span',{class:'sis-pct'},done+'/'+total+' · '+Math.round(done/total*100||0)+'%')
  );

  const header=el('button',{class:'sis-header',onClick:()=>{
    STATE.expandedSis[sis.id]=!STATE.expandedSis[sis.id]; renderMain();
  }},ring,nameRow,
    el('span',{class:'sis-chevron'+(expanded?' open':'')},'▾')
  );

  const wrap=el('div',{class:'sis-wrap'+(allDone?' done':'')},header);
  if(allDone) wrap.style.borderColor=sis.color+'55';

  if(expanded){
    const progFill=el('div',{class:'sis-prog-fill',style:{
      background:sis.color,width:Math.round(done/total*100||0)+'%'
    }});
    const prog=el('div',{class:'sis-prog'},progFill);
    const body=el('div',{class:'sis-body'},prog);
    tareasApl.forEach(function(t){ body.appendChild(renderTask(t)); });
    wrap.appendChild(body);
  }
  return wrap;
}

function renderMain(){
  const main=document.getElementById('main');
  if(!main) return;
  main.innerHTML='';

  if(STATE.km===0){
    main.appendChild(el('div',{id:'empty'},
      el('div',{class:'ico'},'🔧'),
      el('p',{},'Selecciona los kilómetros actuales'),
      el('p',{style:{marginTop:'6px',fontSize:'11px'}},'para ver las tareas de mantenimiento')
    ));
    return;
  }

  const kmk=String(STATE.km);
  const checks=STATE.checks[kmk]||{};
  const notas=STATE.notas[kmk]||{};
  const comentario=STATE.comentarios[kmk]||'';
  const tareasApl=TAREAS.filter(t=>shouldDo(t,STATE.km));

  if(tareasApl.length===0){
    main.appendChild(el('div',{id:'empty'},
      el('p',{},'No hay tareas programadas para este intervalo exacto.')
    ));
    return;
  }

  // Filter
  function applyFilter(ts){
    if(STATE.filter==='critico') return ts.filter(t=>t.prio==='CRITICO');
    if(STATE.filter==='pend') return ts.filter(t=>!checks[t.id]);
    return ts;
  }

  const done=tareasApl.filter(t=>checks[t.id]).length;
  const total=tareasApl.length;
  const pct=Math.round(done/total*100);

  // Progress card
  const barEl=el('div',{id:'progress-bar',style:{width:pct+'%'}});
  if(pct===100) barEl.classList.add('done');

  const statsRow=el('div',{class:'row',style:{marginTop:'8px',gap:'10px'}},
    el('span',{class:'stat-pill',style:{color:'#ef5350'}},
      tareasApl.filter(t=>t.prio==='CRITICO').length+' Críticas'),
    el('span',{class:'stat-pill',style:{color:'#ffa726'}},
      tareasApl.filter(t=>t.prio==='RECOMENDADO').length+' Recomend.'),
    el('span',{class:'stat-pill',style:{color:'#66bb6a'}},
      tareasApl.filter(t=>t.prio==='OPCIONAL').length+' Opcionales')
  );

  main.appendChild(el('div',{class:'card no-print'},
    el('div',{class:'row',style:{justifyContent:'space-between',marginBottom:'8px'}},
      el('span',{style:{fontWeight:'700',fontSize:'14px'}},'Revisión '+Number(STATE.km).toLocaleString('es-ES')+' km'),
      el('span',{style:{color:'#7fb3c8',fontSize:'12px'}},done+' / '+total)
    ),
    el('div',{id:'progress-bar-wrap'},barEl),
    statsRow
  ));

  // Filter bar
  const filterBar=el('div',{id:'filter-bar','class':'no-print'});
  [['all','Todas'],['critico','⚠ Críticas'],['pend','◯ Pendientes']].forEach(([id,lbl])=>{
    const btn=el('button',{
      class:'filter-btn'+(STATE.filter===id?' active':''),
      onClick:()=>{STATE.filter=id; renderMain();}
    },lbl);
    filterBar.appendChild(btn);
  });
  // History btn
  filterBar.appendChild(el('button',{id:'btn-history',onClick:()=>{
    STATE.showHistory=!STATE.showHistory; renderMain();
  }},'📋 Historial'));
  // Print btn
  filterBar.appendChild(el('button',{id:'btn-print',onClick:()=>window.print()},'🖨️ Imprimir / PDF'));
  main.appendChild(filterBar);

  // History
  if(STATE.showHistory){
    const histWrap=el('div',{id:'history-wrap','class':'no-print'});
    histWrap.appendChild(el('p',{style:{fontSize:'12px',letterSpacing:'1px',color:'#7fb3c8',marginBottom:'10px'}},'HISTORIAL DE REVISIONES'));
    const entries=Object.entries(STATE.checks).filter(([,v])=>Object.keys(v).length>0).sort((a,b)=>Number(b[0])-Number(a[0]));
    if(entries.length===0){
      histWrap.appendChild(el('p',{style:{color:'rgba(255,255,255,.3)',fontSize:'12px'}},'Sin revisiones registradas.'));
    }
    entries.forEach(([km,v])=>{
      const t2=TAREAS.filter(t=>shouldDo(t,Number(km))).length;
      const d2=Object.values(v).filter(Boolean).length;
      const pct2=t2>0?Math.round(d2/t2*100):0;
      const isComplete=d2===t2;
      const row=el('div',{class:'hist-row'},
        el('button',{class:'hist-km',onClick:()=>{
          STATE.km=Number(km);
          STATE.showHistory=false;
          STATE.filter='all';
          document.getElementById('km-select').value=STATE.km;
          renderMain();
        }},Number(km).toLocaleString('es-ES')+' km'),
        el('div',{class:'hist-bar'},
          el('div',{class:'hist-fill',style:{background:isComplete?'#4caf50':'#006fa6',width:pct2+'%'}})
        ),
        el('span',{class:'hist-count'},d2+'/'+t2)
      );
      histWrap.appendChild(row);
    });
    main.appendChild(histWrap);
  }

  // Sistemas
  SISTEMAS.forEach(sis=>{
    const sisTareas=applyFilter(tareasApl.filter(t=>t.sis===sis.id));
    // for progress ring use full list even when filtered
    const sisAll=tareasApl.filter(t=>t.sis===sis.id);
    if(sisTareas.length===0) return;
    // render with filtered tasks but pass full list for progress
    const wrap=renderSistemaMixed(sis,sisAll,sisTareas);
    main.appendChild(wrap);
  });

  // Done banner
  if(done===total){
    main.appendChild(el('div',{id:'done-banner'},
      el('div',{style:{fontSize:'30px',marginBottom:'6px'}},'✅'),
      el('p',{},'REVISIÓN COMPLETADA'),
      el('small',{},`Todas las tareas de ${Number(STATE.km).toLocaleString('es-ES')} km marcadas`)
    ));
  }

  // Comentarios
  main.appendChild(renderComentarios(comentario));
}

function renderSistemaMixed(sis,allTareas,filteredTareas){
  const kmk=String(STATE.km);
  const checks=STATE.checks[kmk]||{};
  const done=allTareas.filter(t=>checks[t.id]).length;
  const total=allTareas.length;
  const allDone=done===total&&total>0;
  const expanded=!!STATE.expandedSis[sis.id];

  const ring=svgRing(done,total,44,4,sis.color);
  const nameRow=el('div',{style:{flex:'1'}},
    el('div',{class:'row',style:{gap:'6px'}},
      el('span',{class:'sis-name',style:{color:allDone?sis.color:'#e8f4f8'}},sis.label),
      allDone?el('span',{class:'sis-done-badge',style:{background:sis.color}},'✓ LISTO'):''
    ),
    el('span',{class:'sis-pct'},done+'/'+total+' · '+Math.round(done/total*100||0)+'%')
  );

  const header=el('button',{class:'sis-header',onClick:()=>{
    STATE.expandedSis[sis.id]=!STATE.expandedSis[sis.id]; renderMain();
  }},ring,nameRow,
    el('span',{class:'sis-chevron'+(expanded?' open':'')},'▾')
  );

  const wrap=el('div',{class:'sis-wrap'+(allDone?' done':'')},header);
  if(allDone) wrap.style.borderColor=sis.color+'55';

  if(expanded){
    const pct=Math.round(done/total*100||0);
    const body=el('div',{class:'sis-body'},
      el('div',{class:'sis-prog'},
        el('div',{class:'sis-prog-fill',style:{background:sis.color,width:pct+'%'}})
      )
    );
    filteredTareas.forEach(function(t){ body.appendChild(renderTask(t)); });
    wrap.appendChild(body);
  }
  return wrap;
}

function renderComentarios(value){
  const wrap=el('div',{id:'comentarios-wrap'});
  const hdr=el('div',{id:'comentarios-header'},
    el('p',{},'💬 Comentarios de la revisión'),
    el('small',{},'Observaciones · taller · pendientes para próxima revisión')
  );
  const ta=el('textarea',{id:'comentarios-ta',placeholder:'Ej:\n— Turbo con ligero ruido a 3000 rpm, monitorizar\n— Neumáticos al límite, cambiar en próxima revisión\n— Taller: Autovolvo Madrid · Mecánico: Carlos · Factura nº 1234'},value);
  // Update state silently — NO renderMain(), NO DOM redraw.
  // Only save to localStorage + Drive after 5s of inactivity.
  let _comentarioTimer=null;
  ta.addEventListener('input',e=>{
    const kmk=String(STATE.km);
    STATE.comentarios[kmk]=e.target.value;
    // localStorage: debounce 5 s
    clearTimeout(_comentarioTimer);
    _comentarioTimer=setTimeout(function(){
      lsSave();
      if(_token){ setState({syncState:'saving'}); clearTimeout(_saveTimer);
        _saveTimer=setTimeout(saveToDrive,1000); }
    },5000);
  });
  // Also save on blur (when user dismisses keyboard)
  ta.addEventListener('blur',function(){
    const kmk=String(STATE.km);
    STATE.comentarios[kmk]=ta.value;
    clearTimeout(_comentarioTimer);
    lsSave();
    if(_token){ clearTimeout(_saveTimer); _saveTimer=setTimeout(saveToDrive,800); }
  });
  wrap.appendChild(hdr);
  wrap.appendChild(ta);
  return wrap;
}

   FULL RENDER

  renderMatricula();
  renderAuthBar();

</script>
