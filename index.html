// ── Config ── REEMPLAZA con tu Client ID de Google Cloud Console ──────────
const GOOGLE_CLIENT_ID = "270446134512-88stntlo997hs1h64uos32rof3bd8lvo.apps.googleusercontent.com";
const SCOPES = "https://www.googleapis.com/auth/drive.appdata";
const FILE_NAME = "xc90_mantenimiento_data.json";

// ── Estado global de auth ─────────────────────────────────────────────────
let _tokenClient = null;
let _accessToken = null;
let _driveFileId = null;  // ID del archivo en Drive (caché)
let _saveTimer = null;    // debounce timer

function isAuthenticated() { return !!_accessToken; }

// ── Inicializar Google Identity Services ──────────────────────────────────
function initGoogleAuth(onReady) {
  if (!window.google?.accounts?.oauth2) {
    setTimeout(() => initGoogleAuth(onReady), 200);
    return;
  }
  _tokenClient = window.google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.error) { console.error("Auth error:", resp); return; }
      _accessToken = resp.access_token;
      onReady && onReady();
    }
  });
}

function requestLogin(callback) {
  if (!_tokenClient) { alert("Google aún no está listo, espera un momento."); return; }
  _tokenClient._callback_override = callback;
  _tokenClient.callback = (resp) => {
    if (resp.error) return;
    _accessToken = resp.access_token;
    callback && callback();
  };
  _tokenClient.requestAccessToken({ prompt: "consent" });
}

function logout() {
  if (_accessToken) {
    window.google.accounts.oauth2.revoke(_accessToken, () => {});
  }
  _accessToken = null;
  _driveFileId = null;
}

// ── Drive API helpers ─────────────────────────────────────────────────────
async function driveRequest(url, opts = {}) {
  const res = await fetch(url, {
    ...opts,
    headers: {
      "Authorization": "Bearer " + _accessToken,
      "Content-Type": "application/json",
      ...(opts.headers || {})
    }
  });
  if (res.status === 401) { _accessToken = null; throw new Error("TOKEN_EXPIRED"); }
  return res;
}

async function findDriveFile() {
  if (_driveFileId) return _driveFileId;
  const res = await driveRequest(
    `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${FILE_NAME}'&fields=files(id,name)`
  );
  const data = await res.json();
  if (data.files && data.files.length > 0) {
    _driveFileId = data.files[0].id;
    return _driveFileId;
  }
  return null;
}

async function readDriveFile() {
  const fileId = await findDriveFile();
  if (!fileId) return null;
  const res = await driveRequest(
    `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`
  );
  if (!res.ok) return null;
  return await res.json();
}

async function writeDriveFile(data) {
  const body = JSON.stringify(data);
  const fileId = await findDriveFile();

  if (fileId) {
    // Update existing
    await driveRequest(
      `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,
      { method: "PATCH", headers: { "Content-Type": "application/json" }, body }
    );
  } else {
    // Create new in appDataFolder (hidden from user's Drive, only app can see it)
    const meta = { name: FILE_NAME, parents: ["appDataFolder"] };
    const form = new FormData();
    form.append("metadata", new Blob([JSON.stringify(meta)], { type: "application/json" }));
    form.append("file", new Blob([body], { type: "application/json" }));
    const res = await fetch(
      "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id",
      { method: "POST", headers: { Authorization: "Bearer " + _accessToken }, body: form }
    );
    const created = await res.json();
    _driveFileId = created.id;
  }
}

// ── Unified data store: { checks, meta } ─────────────────────────────────
let _localCache = null;

async function loadAllData() {
  if (!isAuthenticated()) {
    // Fallback to localStorage if not logged in
    const checks = (() => { try { const v=localStorage.getItem("xc90_checks"); return v?JSON.parse(v):{}; } catch{ return {}; } })();
    const meta = (() => { try { const v=localStorage.getItem("xc90_meta"); return v?JSON.parse(v):{ kmActual:0,matricula:"",notas:{},comentarios:{} }; } catch{ return { kmActual:0,matricula:"",notas:{},comentarios:{} }; } })();
    _localCache = { checks, meta };
    return _localCache;
  }
  try {
    const data = await readDriveFile();
    _localCache = data || { checks: {}, meta: { kmActual:0, matricula:"", notas:{}, comentarios:{} } };
    // Also sync to localStorage as offline cache
    localStorage.setItem("xc90_checks", JSON.stringify(_localCache.checks));
    localStorage.setItem("xc90_meta", JSON.stringify(_localCache.meta));
    return _localCache;
  } catch(e) {
    console.warn("Drive read failed, using localStorage:", e);
    const checks = (() => { try { const v=localStorage.getItem("xc90_checks"); return v?JSON.parse(v):{}; } catch{ return {}; } })();
    const meta = (() => { try { const v=localStorage.getItem("xc90_meta"); return v?JSON.parse(v):{ kmActual:0,matricula:"",notas:{},comentarios:{} }; } catch{ return { kmActual:0,matricula:"",notas:{},comentarios:{} }; } })();
    _localCache = { checks, meta };
    return _localCache;
  }
}

async function saveAllData(checks, meta) {
  // Always write to localStorage immediately (offline cache)
  localStorage.setItem("xc90_checks", JSON.stringify(checks));
  localStorage.setItem("xc90_meta", JSON.stringify(meta));
  _localCache = { checks, meta };

  if (!isAuthenticated()) return;

  // Debounce Drive writes (avoid hammering API on every keystroke)
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async () => {
    try {
      await writeDriveFile({ checks, meta });
    } catch(e) {
      if (e.message === "TOKEN_EXPIRED") {
        console.warn("Token expired, data saved locally only");
      } else {
        console.error("Drive write failed:", e);
      }
    }
  }, 1200);
}

/* ─── STORAGE API (compatible with app) ─────────────────────────────────── */
async function loadChecks() {
  const d = await loadAllData();
  return d.checks || {};
}
async function saveChecks(checks) {
  const meta = _localCache?.meta || { kmActual:0, matricula:"", notas:{}, comentarios:{} };
  await saveAllData(checks, meta);
}
async function loadMeta() {
  const d = await loadAllData();
  return d.meta || { kmActual:0, matricula:"", notas:{}, comentarios:{} };
}
async function saveMeta(meta) {
  const checks = _localCache?.checks || {};
  await saveAllData(checks, meta);
}

function ProgressRing({ done, total, size=52, stroke=5, color="#006FA6" }) {
  const r=(size-stroke*2)/2, circ=2*Math.PI*r, pct=total>0?done/total:0;
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round"
        style={{transition:"stroke-dashoffset 0.5s ease"}}/>
      <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="middle" fill="white"
        fontSize={11} fontFamily="'Space Mono',monospace"
        style={{transform:`rotate(90deg)`,transformOrigin:`${size/2}px ${size/2}px`}}>
        {total>0?`${Math.round(pct*100)}%`:"—"}
      </text>
    </svg>
  );
}

      const mf = { kmActual:0,matricula:"",notas:{},comentarios:{}, ...m };
      setMeta(mf); setMatriculaV(mf.matricula||"");
      if(mf.kmActual) setKmActual(mf.kmActual);

  const comentario = meta.comentarios?.[kmKey]||"";

  const filterT = ts => {
    if(activeFilter==="critico")   return ts.filter(t=>t.prio==="CRÍTICO");
    if(activeFilter==="pendiente") return ts.filter(t=>!checks[t.id]);

  };

  const handleToggle = useCallback(async(id)=>{

  const handleKmChange = async(km)=>{
    setKmActual(km); setExportStatus(null);

    if(km>0){
      const first = SISTEMAS.find(s=>TAREAS.some(t=>t.sis===s.id&&shouldDoAt(t,km)));

  );

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0d1f2d 0%,#0a1520 60%,#060f16 100%)",
      fontFamily:"'DM Sans',sans-serif",color:"#E8F4F8"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap');
        * { box-sizing:border-box; }
        select option { background:#1B3A4B; }
        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-thumb { background:#006FA6; border-radius:2px; }
        textarea::placeholder { color:rgba(255,255,255,0.18); line-height:1.8; }
        @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
      `}</style>
      <div style={{maxWidth:780,margin:"0 auto",padding:"0 16px 60px"}}>

        {/* HEADER */}
        <div style={{padding:"24px 0 18px",borderBottom:"1px solid rgba(255,255,255,0.07)",marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:3}}>
                <div style={{width:5,height:28,borderRadius:3,background:"linear-gradient(180deg,#006FA6,#1B3A4B)"}}/>
                <h1 style={{margin:0,fontSize:20,fontWeight:700,fontFamily:"'Space Mono',monospace",letterSpacing:-0.5,color:"#fff"}}>
                  VOLVO XC90 D5</h1>
              </div>
              <p style={{margin:0,color:"#7FB3C8",fontSize:11,fontFamily:"'Space Mono',monospace",paddingLeft:14}}>
                Plan de mantenimiento · 2019 · AWD · 235 CV Diesel</p>
            </div>
            <div>
              {!editMatric?(
                <button onClick={()=>setEditMatric(true)} style={{background:"rgba(255,255,255,0.05)",
                  border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,padding:"7px 12px",
                  cursor:"pointer",color:"#fff",fontFamily:"'Space Mono',monospace",
                  fontSize:12,letterSpacing:2}}>{meta.matricula||"— MATRÍCULA —"}</button>
              ):(
                <div style={{display:"flex",gap:5}}>
                  <input autoFocus value={matriculaV}
                    onChange={e=>setMatriculaV(e.target.value.toUpperCase())}
                    placeholder="0000 ABC"
                    onKeyDown={e=>e.key==="Enter"&&handleMatriculaSave()}
                    style={{background:"rgba(255,255,255,0.08)",border:"1px solid #006FA6",
                      borderRadius:7,padding:"7px 10px",color:"#fff",width:110,
                      fontFamily:"'Space Mono',monospace",fontSize:13,outline:"none"}}/>
                  <button onClick={handleMatriculaSave} style={{background:"#006FA6",border:"none",
                    borderRadius:7,padding:"7px 11px",color:"#fff",cursor:"pointer"}}>✓</button>
                </div>
              )}
            </div>
          </div>
        </div>

        {/* KM SELECTOR */}
        <div style={{marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:10,
            background:"linear-gradient(135deg,#1B3A4B,#0d2535)",borderRadius:14,
            padding:"14px 20px",boxShadow:"0 6px 28px rgba(0,0,0,0.28)"}}>
            <span style={{color:"#7FB3C8",fontFamily:"'Space Mono',monospace",fontSize:10,
              letterSpacing:2,textTransform:"uppercase",flexShrink:0}}>KM actuales</span>
            <select value={kmActual} onChange={e=>handleKmChange(Number(e.target.value))} style={{
              background:"transparent",border:"none",borderBottom:"2px solid #006FA6",
              color:"#fff",fontFamily:"'Space Mono',monospace",fontSize:20,fontWeight:"bold",
              padding:"3px 6px",cursor:"pointer",outline:"none",WebkitAppearance:"none",flex:1}}>
              <option value={0} style={{background:"#1B3A4B"}}>— seleccionar —</option>
              {KM_STEPS.map(km=><option key={km} value={km} style={{background:"#1B3A4B"}}>
                {km.toLocaleString("es-ES")} km</option>)}
            </select>
          </div>
        </div>

        {/* AUTH BAR */}
        <div className="no-print">
          <AuthBar authState={authState} onLogin={handleLogin} onLogout={handleLogout} syncStatus={syncStatus}/>
        </div>

        {/* STATS */}
        {kmActual>0&&(
          <div style={{background:"rgba(255,255,255,0.03)",borderRadius:14,
            border:"1px solid rgba(255,255,255,0.07)",padding:"14px 18px",marginBottom:16,
            display:"flex",alignItems:"center",gap:18}}>
            <ProgressRing done={done} total={total} size={60} stroke={5} color="#006FA6"/>
            <div style={{flex:1}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
                <span style={{color:"#fff",fontWeight:700,fontSize:14}}>
                  Revisión {kmActual.toLocaleString("es-ES")} km</span>
                <span style={{color:"#7FB3C8",fontFamily:"'Space Mono',monospace",fontSize:12}}>
                  {done} / {total}</span>
              </div>
              <div style={{height:5,borderRadius:3,background:"rgba(255,255,255,0.07)",overflow:"hidden"}}>
                <div style={{height:"100%",borderRadius:3,transition:"width 0.5s",width:`${pct}%`,
                  background:pct===100?"linear-gradient(90deg,#2E7D32,#4CAF50)":"linear-gradient(90deg,#006FA6,#00B4D8)"}}/>
              </div>
              <div style={{display:"flex",gap:10,marginTop:8}}>
                {[["⚠ Críticas",tareasAplicables.filter(t=>t.prio==="CRÍTICO").length,"#C62828"],
                  ["Recomend.",tareasAplicables.filter(t=>t.prio==="RECOMENDADO").length,"#E65100"],
                  ["Opcionales",tareasAplicables.filter(t=>t.prio==="OPCIONAL").length,"#2E7D32"]
                ].map(([l,c,col])=>(
                  <span key={l} style={{fontSize:11,fontFamily:"'Space Mono',monospace",color:col}}>{c} {l}</span>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* TOOLBAR */}
        {kmActual>0&&total>0&&(
          <div style={{display:"flex",gap:7,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
            {[["all","Todas"],["critico","⚠ Críticas"],["pendiente","◯ Pendientes"]].map(([id,lbl])=>(
              <button key={id} onClick={()=>setActiveFilter(id)} style={{
                background:activeFilter===id?"#006FA6":"rgba(255,255,255,0.05)",
                border:`1px solid ${activeFilter===id?"#006FA6":"rgba(255,255,255,0.1)"}`,
                borderRadius:20,padding:"5px 12px",cursor:"pointer",
                color:activeFilter===id?"#fff":"rgba(255,255,255,0.55)",
                fontSize:12,fontFamily:"'DM Sans',sans-serif",fontWeight:500,transition:"all 0.2s"
              }}>{lbl}</button>
            ))}
            <button onClick={()=>setShowHistory(v=>!v)} style={{
              background:showHistory?"rgba(255,255,255,0.1)":"rgba(255,255,255,0.04)",
              border:"1px solid rgba(255,255,255,0.1)",borderRadius:20,padding:"5px 12px",
              cursor:"pointer",color:"rgba(255,255,255,0.55)",fontSize:12}}>📋 Historial</button>
            <div style={{marginLeft:"auto"}}>
              <ExportDocxButton onClick={handleExport} loading={exporting}
                disabled={!kmActual||total===0} exportStatus={exportStatus}/>
            </div>
          </div>
        )}

        {/* EXPORT STATUS MESSAGE */}
        {exportStatus==="ok"&&(
          <div style={{background:"rgba(46,125,50,0.12)",border:"1px solid rgba(46,125,50,0.3)",
            borderRadius:12,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"flex-start",gap:10}}>
            <span style={{fontSize:20}}>📎</span>
            <div>
              <p style={{margin:0,color:"#81C784",fontWeight:600,fontSize:13}}>
                Ficha DOCX generada correctamente</p>
              <p style={{margin:"4px 0 0",color:"rgba(255,255,255,0.5)",fontSize:12,lineHeight:1.5}}>
                Usa "Guardar como PDF" en el diálogo de impresión para guardar la ficha en el móvil o enviarla por WhatsApp.</p>
            </div>
          </div>
        )}

        {/* HISTORIAL */}
        {showHistory&&(
          <div style={{background:"rgba(255,255,255,0.03)",borderRadius:14,
            border:"1px solid rgba(255,255,255,0.07)",padding:18,marginBottom:16}}>
            <h3 style={{margin:"0 0 12px",fontSize:12,fontFamily:"'Space Mono',monospace",
              color:"#7FB3C8",letterSpacing:1}}>HISTORIAL DE REVISIONES</h3>
            {historial.length===0
              ?<p style={{color:"rgba(255,255,255,0.25)",fontSize:12,margin:0}}>Sin revisiones registradas.</p>
              :historial.map(([km,v])=>{
                const t2=TAREAS.filter(t=>shouldDoAt(t,Number(km))).length;
                const d2=Object.values(v).filter(Boolean).length;
                return (
                  <div key={km} style={{display:"flex",alignItems:"center",gap:12,
                    padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                    <button onClick={()=>{ handleKmChange(Number(km)); setShowHistory(false); }} style={{
                      background:"rgba(0,111,166,0.15)",border:"1px solid rgba(0,111,166,0.35)",
                      borderRadius:7,padding:"3px 10px",cursor:"pointer",
                      color:"#00B4D8",fontFamily:"'Space Mono',monospace",fontSize:12,fontWeight:"bold"}}>
                      {Number(km).toLocaleString("es-ES")} km</button>
                    <div style={{flex:1,height:3,borderRadius:2,background:"rgba(255,255,255,0.07)",overflow:"hidden"}}>
                      <div style={{height:"100%",borderRadius:2,
                        background:d2===t2?"#2E7D32":"#006FA6",
                        width:`${t2>0?Math.round(d2/t2*100):0}%`}}/>
                    </div>
                    <span style={{color:"rgba(255,255,255,0.4)",fontFamily:"'Space Mono',monospace",fontSize:11}}>
                      {d2}/{t2}</span>
                  </div>
                );
              })}
          </div>
        )}

        {/* EMPTY */}
        {kmActual===0&&(
          <div style={{textAlign:"center",padding:"60px 20px",color:"rgba(255,255,255,0.25)"}}>
            <div style={{fontSize:46,marginBottom:14}}>🔧</div>
            <p style={{fontFamily:"'Space Mono',monospace",fontSize:13,letterSpacing:1}}>
              Selecciona los kilómetros actuales<br/>para ver las tareas de mantenimiento</p>
          </div>
        )}

        {/* TAREAS */}
        {kmActual>0&&total===0&&(
          <div style={{textAlign:"center",padding:"40px 20px",color:"rgba(255,255,255,0.25)"}}>
            <p style={{fontFamily:"'Space Mono',monospace",fontSize:13}}>
              No hay tareas programadas para este intervalo exacto.</p>
          </div>
        )}

        {kmActual>0&&SISTEMAS.map(sis=>{
          const sT=filterT(tareasAplicables.filter(t=>t.sis===sis.id));
          if(!sT.length) return null;
          return (
            <SistemaSection key={sis.id} sistema={sis} tareas={sT}
              checks={checks} onToggle={handleToggle}
              notas={notasKm} onNota={handleNota}
              expanded={!!expandedSis[sis.id]}
              onToggleExpand={()=>setExpandedSis(v=>({...v,[sis.id]:!v[sis.id]}))}/>
          );
        })}

        {/* COMPLETADO */}
        {kmActual>0&&total>0&&done===total&&(
          <div style={{marginTop:16,borderRadius:14,padding:"20px",textAlign:"center",
            background:"linear-gradient(135deg,rgba(46,125,50,0.18),rgba(46,125,50,0.04))",
            border:"1px solid rgba(46,125,50,0.35)"}}>
            <div style={{fontSize:32,marginBottom:6}}>✅</div>
            <p style={{margin:0,fontFamily:"'Space Mono',monospace",fontSize:14,color:"#4CAF50",fontWeight:"bold"}}>
              REVISIÓN COMPLETADA</p>
            <p style={{margin:"5px 0 0",color:"rgba(255,255,255,0.4)",fontSize:12}}>
              Todas las tareas de {kmActual.toLocaleString("es-ES")} km marcadas</p>
          </div>
        )}

        {/* COMENTARIOS */}
        {kmActual>0&&total>0&&(
          <div style={{marginTop:20}}>
            <ComentariosPanel value={comentario} onChange={handleComentario}/>
          </div>
        )}

        {/* EXPORT BOTTOM */}
        {kmActual>0&&total>0&&(
          <div style={{display:"flex",justifyContent:"center",gap:12,
            marginTop:8,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
            <ExportDocxButton onClick={handleExport} loading={exporting}
              disabled={!kmActual||total===0} exportStatus={exportStatus}/>
            <span style={{color:"rgba(255,255,255,0.3)",fontSize:11,fontFamily:"'Space Mono',monospace"}}>
              Genera un Word listo para imprimir</span>
          </div>
        )}

        {/* FOOTER */}
        <div style={{marginTop:32,paddingTop:16,borderTop:"1px solid rgba(255,255,255,0.05)",
          display:"flex",justifyContent:"space-between"}}>
          <span style={{color:"rgba(255,255,255,0.18)",fontSize:10,fontFamily:"'Space Mono',monospace"}}>
            XC90 D5 · 2019 · Plan Maestro v4</span>
          <span style={{color:"rgba(255,255,255,0.18)",fontSize:10,fontFamily:"'Space Mono',monospace"}}>
            {Object.values(allChecks).reduce((a,v)=>a+Object.values(v).filter(Boolean).length,0)} checks totales</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(React.StrictMode, null, React.createElement(App, null))
);
  </script>
</body>
</html>
